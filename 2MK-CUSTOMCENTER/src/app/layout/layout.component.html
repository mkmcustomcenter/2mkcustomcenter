<div class="layout-container">
  <header class="main-header" [class.visible]="isHeaderVisible()">
    <div class="logo-header">
      <img src="/assets/pp.png" alt="Logo 2MK Custom Center" class="logo" width="160" height="80" />
    </div>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" />
    <label for="nav-toggle" class="nav-toggle-label" aria-label="Ouvrir le menu">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="main-nav">
      <a (click)="scrollToSection('intro'); closeMobileMenu()">Accueil</a>
      <!-- <a (click)="scrollToSection('presentation')">Présentation</a> -->
      <a (click)="scrollToSection('prestations'); closeMobileMenu()">Prestations</a>
      <!-- <a (click)="scrollToSection('galerie')">Galerie</a> -->
      <a (click)="scrollToSection('contact'); closeMobileMenu()" class="contact-link">Contact</a>
      <!-- <a (click)="scrollToSection('reservation')">Réservation</a> -->
      <!-- <a (click)="scrollToSection('evenements')">Événements</a> -->
      <a (click)="scrollToSection('mentions'); closeMobileMenu()">Mentions</a>
    </nav>

    <button type="button" class="nav-backdrop" aria-label="Fermer le menu" (click)="closeMobileMenu()"></button>
  </header>

  <main class="main-content" #mainContent [class.intro-gate-active]="!isHeaderVisible()" (click)="closeMobileMenu()">
    <section id="intro">
      <app-intro></app-intro>
    </section>

    <!-- <section id="presentation">
      <app-presentation></app-presentation>
    </section> -->

    <section id="prestations">
      <app-prestation></app-prestation>
    </section>

    <!-- <section id="galerie">
      <app-galerie></app-galerie>
    </section> -->

    <section id="contact">
      <app-contact></app-contact>
    </section>

    <!-- <section id="reservation">
            <app-reservation></app-reservation>
                </section>--> -->

    <!-- <section id="evenements">
      <app-evenements></app-evenements>
    </section> -->

    <section id="mentions">
      <app-mentions></app-mentions>
    </section>
  </main>
</div>
