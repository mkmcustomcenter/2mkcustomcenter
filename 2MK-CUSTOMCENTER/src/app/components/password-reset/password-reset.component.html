<div class="password-reset-container">
  <!-- SUCCESS MESSAGE -->
  <div class="reset-success" *ngIf="resetSuccess">
    <div class="success-box">
      <h1>✅ Mot de passe réinitialisé</h1>
      <p>Votre mot de passe a été changé avec succès!</p>
      <p class="redirect-message">Redirection vers le dashboard...</p>
    </div>
  </div>

  <!-- RESET FORM -->
  <div class="reset-form-container" *ngIf="!resetSuccess">
    <div class="reset-box">
      <h1>🔐 Réinitialiser le mot de passe</h1>

      <!-- ERROR MESSAGE -->
      <div class="error-alert" *ngIf="errorMessage">
        <p>⚠️ {{ errorMessage }}</p>
        <button class="btn-back" (click)="goBack()" *ngIf="!isValidToken">
          Retour à l'accueil
        </button>
      </div>

      <!-- VALID TOKEN FORM -->
      <form [formGroup]="resetForm" (ngSubmit)="onResetSubmit()" *ngIf="isValidToken" class="reset-form">
        <div class="form-group">
          <label for="newPassword">Nouveau mot de passe *</label>
          <input
            id="newPassword"
            type="password"
            formControlName="newPassword"
            class="form-input"
            placeholder="Minimum 6 caractères"
            [disabled]="isResetting"
          />
          <span class="error-message" *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
            Le mot de passe doit contenir au moins 6 caractères
          </span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe *</label>
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            class="form-input"
            placeholder="Confirmez votre mot de passe"
            [disabled]="isResetting"
          />
          <span class="error-message" *ngIf="resetForm.get('confirmPassword')?.invalid && resetForm.get('confirmPassword')?.touched">
            Veuillez confirmer votre mot de passe
          </span>

          <span class="error-message" *ngIf="resetForm.hasError('passwordMismatch') && resetForm.get('confirmPassword')?.touched">
            Les mots de passe ne correspondent pas
          </span>
        </div>

        <button 
          type="submit" 
          class="btn-submit" 
          [disabled]="resetForm.invalid || isResetting"
        >
          {{ isResetting ? 'Réinitialisation...' : 'Réinitialiser le mot de passe' }}
        </button>
      </form>
    </div>
  </div>
</div>
